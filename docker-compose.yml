version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: healify-db
    environment:
      POSTGRES_DB: healify
      POSTGRES_USER: healify
      POSTGRES_PASSWORD: healify123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    container_name: healify-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass healify_redis

volumes:
  pgdata:
