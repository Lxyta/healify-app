server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/healify
    username: healify
    password: healify123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password: healify_redis
      timeout: 3000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: healify-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration-ms: 604800000  # 7 days

ai-service:
  base-url: http://localhost:8000
  timeout: 60000  # 60s for AI generation
